scenario_id: nature_article
display_name: Nature Article
category: science
objective: Produce a high-quality Nature Article that meets professional standards
  for the science domain. Nature primary research article.
max_iterations: 5
target_score: 0.9
min_score: 0.6
evaluation:
  criteria:
    novelty:
      weight: 0.25
      min: 0.8
    soundness:
      weight: 0.25
      min: 0.8
    significance:
      weight: 0.2
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.8
    citations:
      weight: 0.1
      min: 0.85
    depth:
      weight: 0.05
      min: 0.7
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  - pubmed
  recency_years: 3
  min_sources: 15
style:
  formality: 0.98
  voice: third_person
  citation_style: natbib
  required_sections:
  - abstract
  - introduction
  - results
  - discussion
  - methods
tags:
- science
- nature-article
- nature
