scenario_id: change_management
display_name: Change Management Plan
category: hr_ops
objective: Produce a high-quality Change Management Plan that meets professional standards
  for the hr_ops domain. Organizational change management plan. Apply SMART goals.
  Adheres to McKinsey 7-S standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.25
      min: 0.7
    soundness:
      weight: 0.2
      min: 0.65
    depth:
      weight: 0.15
      min: 0.6
    significance:
      weight: 0.15
      min: 0.55
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.7
  voice: third_person
  citation_style: natbib
  required_sections:
  - vision
  - stakeholder analysis
  - communication plan
  - training
  - timeline
  - risk mitigation
  - objective
  - current_state
  terminology_registry: hr_operations
tags:
- hr_ops
- change-management
time_budget_minutes: 30
experiment:
  enabled: true
