scenario_id: screenplay_final_draft
display_name: Screenplay (Final Draft)
category: creative
objective: Produce a high-quality Screenplay (Final Draft) that meets professional
  standards for the creative domain. Feature screenplay per Final Draft format.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    style:
      weight: 0.3
      min: 0.7
    clarity:
      weight: 0.25
      min: 0.65
    depth:
      weight: 0.2
      min: 0.6
    structure:
      weight: 0.15
      min: 0.6
    novelty:
      weight: 0.1
      min: 0.5
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.5
  voice: third_person
  citation_style: natbib
  required_sections:
  - title page
  - logline
  - scene headings
  - action
  - dialogue
  - transitions
tags:
- creative
- screenplay-final-draft
- final draft
