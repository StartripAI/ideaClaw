scenario_id: api_documentation
display_name: API Documentation
category: professional
objective: Produce a high-quality API Documentation that meets professional standards
  for the professional domain. REST/GraphQL API reference documentation. Apply technical
  specification. Follows postmortem analysis standards. Adheres to IEEE standards.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.75
  voice: third_person
  citation_style: natbib
  required_sections:
  - overview
  - authentication
  - endpoints
  - request/response
  - errors
  - examples
  - summary
  - context
  terminology_registry: technical_professional
tags:
- professional
- api-documentation
time_budget_minutes: 30
experiment:
  enabled: true
