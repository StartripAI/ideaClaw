scenario_id: research_proposal_edu
display_name: Research Proposal (Edu)
category: education
objective: Produce a high-quality Research Proposal (Edu) that meets professional
  standards for the education domain. Educational research proposal. Apply Bloom's
  taxonomy. Follows learning objectives standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    citations:
      weight: 0.15
      min: 0.7
    soundness:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.6
search:
  apis:
  - semantic_scholar
  - openalex
  - google_scholar
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: apa
  required_sections:
  - introduction
  - literature review
  - methodology
  - timeline
  - significance
  - literature_review
  - analysis
  - discussion
  terminology_registry: academic_education
tags:
- education
- research-proposal-edu
time_budget_minutes: 30
experiment:
  enabled: true
