scenario_id: data_analysis_report
display_name: Data Analysis Report
category: general
objective: Produce a high-quality Data Analysis Report that meets professional standards
  for the general domain. Quantitative data analysis report. Follows systematic analysis
  standards. Follows evidence-based methodology standards. Adheres to APA standards.
  Emphasizes rubric.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.25
      min: 0.7
    significance:
      weight: 0.15
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.7
  voice: third_person
  citation_style: natbib
  required_sections:
  - executive summary
  - methodology
  - data description
  - analysis
  - findings
  - limitations
  - recommendations
  terminology_registry: general_professional
tags:
- general
- data-analysis-report
time_budget_minutes: 30
experiment:
  enabled: true
