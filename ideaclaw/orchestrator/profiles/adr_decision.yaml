scenario_id: adr_decision
display_name: Architecture Decision Record
category: professional
objective: Produce a high-quality Architecture Decision Record that meets professional
  standards for the professional domain. ADR per Michael Nygard template.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.75
  voice: third_person
  citation_style: natbib
  required_sections:
  - title
  - status
  - context
  - decision
  - consequences
tags:
- professional
- adr-decision
- adr
