scenario_id: sre_postmortem
display_name: SRE Postmortem (Google)
category: professional
objective: Produce a high-quality SRE Postmortem (Google) that meets professional
  standards for the professional domain. Google SRE-style incident postmortem. Apply
  technical specification. Follows postmortem analysis standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.7
  voice: third_person
  citation_style: natbib
  required_sections:
  - summary
  - impact
  - root cause
  - timeline
  - action items
  - lessons learned
  - context
  - analysis
  terminology_registry: technical_professional
tags:
- professional
- sre-postmortem
- sre
time_budget_minutes: 30
experiment:
  enabled: true
