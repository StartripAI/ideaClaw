scenario_id: ml_workshop
display_name: ML Workshop Paper
category: cs_ml
objective: Produce a high-quality ML Workshop Paper that meets professional standards
  for the cs_ml domain. 4-page ML workshop paper. Apply peer-review standards. Follows
  reproducibility requirements standards. Follows ICML standards.
max_iterations: 3
target_score: 0.75
min_score: 0.5
evaluation:
  criteria:
    novelty:
      weight: 0.2
      min: 0.7
    soundness:
      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.7
    significance:
      weight: 0.15
      min: 0.6
    citations:
      weight: 0.1
      min: 0.8
    depth:
      weight: 0.15
      min: 0.7
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: natbib
  required_sections:
  - abstract
  - introduction
  - method
  - experiments
  - conclusion
  - related_work
  - results
  terminology_registry: ml_research
tags:
- cs_ml
- ml-workshop
time_budget_minutes: 30
experiment:
  enabled: true
