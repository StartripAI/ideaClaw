scenario_id: job_description
display_name: Job Description
category: hr_ops
objective: Produce a high-quality Job Description that meets professional standards
  for the hr_ops domain. Professional job description. Apply SMART goals. Follows
  performance management standards.
max_iterations: 5
target_score: 0.7
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.25
      min: 0.7
    soundness:
      weight: 0.2
      min: 0.65
    depth:
      weight: 0.15
      min: 0.6
    significance:
      weight: 0.15
      min: 0.55
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.75
  voice: third_person
  citation_style: natbib
  required_sections:
  - title
  - summary
  - responsibilities
  - requirements
  - preferred qualifications
  - benefits
  - objective
  - current_state
  terminology_registry: hr_operations
tags:
- hr_ops
- job-description
time_budget_minutes: 30
experiment:
  enabled: true
