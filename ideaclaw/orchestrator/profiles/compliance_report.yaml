scenario_id: compliance_report
display_name: Compliance Report
category: legal
objective: Produce a high-quality Compliance Report that meets professional standards
  for the legal domain. Regulatory compliance assessment.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    soundness:
      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.75
    citations:
      weight: 0.2
      min: 0.75
    depth:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.95
  voice: third_person
  citation_style: natbib
  required_sections:
  - executive summary
  - scope
  - findings
  - gaps
  - remediation plan
  - timeline
tags:
- legal
- compliance-report
