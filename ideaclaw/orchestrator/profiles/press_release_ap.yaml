scenario_id: press_release_ap
display_name: Press Release (AP)
category: journalism
objective: Produce a high-quality Press Release (AP) that meets professional standards
  for the journalism domain. AP-style press release. Apply investigative reporting.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.3
      min: 0.75
    soundness:
      weight: 0.25
      min: 0.7
    significance:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.15
      min: 0.7
    style:
      weight: 0.1
      min: 0.65
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.75
  voice: third_person
  citation_style: natbib
  required_sections:
  - headline
  - dateline
  - lead paragraph
  - body
  - quote
  - boilerplate
  - lead
  - context
  terminology_registry: journalism_media
tags:
- journalism
- press-release-ap
- ap
time_budget_minutes: 30
experiment:
  enabled: true
