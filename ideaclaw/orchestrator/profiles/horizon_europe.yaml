scenario_id: horizon_europe
display_name: EU Horizon Europe
category: grants
objective: Produce a high-quality EU Horizon Europe that meets professional standards
  for the grants domain. EU Horizon Europe per 0-5 scoring. Apply merit review criteria.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    significance:
      weight: 0.25
      min: 0.75
    novelty:
      weight: 0.2
      min: 0.7
    soundness:
      weight: 0.2
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.7
    depth:
      weight: 0.1
      min: 0.65
    citations:
      weight: 0.1
      min: 0.75
search:
  apis:
  - semantic_scholar
  - pubmed
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: apa
  required_sections:
  - excellence
  - impact
  - implementation
  - budget
  - ethics
  - specific_aims
  - significance
  - innovation
  terminology_registry: grant_writing
tags:
- grants
- horizon-europe
- horizon
time_budget_minutes: 30
experiment:
  enabled: true
