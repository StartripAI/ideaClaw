scenario_id: mckinsey_report
display_name: McKinsey-Style Report
category: business
objective: Produce a high-quality McKinsey-Style Report that meets professional standards
  for the business domain. McKinsey Pyramid+MECE structured report.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    depth:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.2
      min: 0.7
    citations:
      weight: 0.15
      min: 0.6
    significance:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.65
search:
  apis:
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.85
  voice: third_person
  citation_style: apa
  required_sections:
  - executive summary
  - introduction
  - analysis
  - findings
  - recommendations
  - conclusion
tags:
- business
- mckinsey-report
- mckinsey
