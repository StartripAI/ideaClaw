scenario_id: whitepaper_tech
display_name: Technical White Paper
category: professional
objective: Produce a high-quality Technical White Paper that meets professional standards
  for the professional domain. Product/technology white paper. Apply technical specification.
  Follows postmortem analysis standards. Follows decision record standards. Adheres
  to IEEE technical publication standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
search:
  apis:
  - semantic_scholar
  - openalex
  - google_scholar
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.85
  voice: third_person
  citation_style: natbib
  required_sections:
  - executive summary
  - problem
  - solution
  - architecture
  - benchmarks
  - conclusion
  - summary
  - context
  terminology_registry: technical_professional
tags:
- professional
- whitepaper-tech
time_budget_minutes: 30
experiment:
  enabled: true
