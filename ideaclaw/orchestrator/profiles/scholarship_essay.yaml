scenario_id: scholarship_essay
display_name: Scholarship Essay
category: education
objective: Produce a high-quality Scholarship Essay that meets professional standards
  for the education domain. Scholarship application essay. Apply Bloom's taxonomy.
  Follows learning objectives standards. Adheres to APA standards.
max_iterations: 5
target_score: 0.8
min_score: 0.6
evaluation:
  criteria:
    style:
      weight: 0.3
      min: 0.7
    clarity:
      weight: 0.25
      min: 0.65
    depth:
      weight: 0.2
      min: 0.6
    structure:
      weight: 0.15
      min: 0.6
    novelty:
      weight: 0.1
      min: 0.5
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.7
  voice: first_person
  citation_style: natbib
  required_sections:
  - introduction
  - qualifications
  - goals
  - impact
  - conclusion
  - literature_review
  - methodology
  - analysis
  terminology_registry: academic_education
tags:
- education
- scholarship-essay
time_budget_minutes: 30
experiment:
  enabled: true
