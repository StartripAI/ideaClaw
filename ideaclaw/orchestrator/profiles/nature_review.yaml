scenario_id: nature_review
display_name: Nature Reviews
category: science
objective: Produce a high-quality Nature Reviews that meets professional standards
  for the science domain. Nature Reviews article. Apply peer-review methodology.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    novelty:
      weight: 0.25
      min: 0.8
    soundness:
      weight: 0.25
      min: 0.8
    significance:
      weight: 0.2
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.8
    citations:
      weight: 0.1
      min: 0.85
    depth:
      weight: 0.3
      min: 0.85
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 80
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: natbib
  required_sections:
  - abstract
  - introduction
  - main sections
  - outlook
  - conclusion
  - background
  - methods
  - results
  terminology_registry: scientific_research
tags:
- science
- nature-review
- nature
time_budget_minutes: 30
experiment:
  enabled: true
