scenario_id: pubmed_medical
display_name: PubMed Medical Paper
category: academic_medical
tags:
- medical
- clinical
objective: Clinical research article following CONSORT/STROBE/PRISMA.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    soundness:
      weight: 0.25
      min: 0.8
    clarity:
      weight: 0.15
      min: 0.75
    citations:
      weight: 0.15
      min: 0.85
    depth:
      weight: 0.15
      min: 0.7
    significance:
      weight: 0.15
      min: 0.65
    ethics:
      weight: 0.1
      min: 0.6
    novelty:
      weight: 0.05
      min: 0.5
search:
  apis:
  - pubmed
  - semantic_scholar
  recency_years: 5
  min_sources: 30
  require_doi: true
style:
  formality: 0.98
  voice: third_person
  tense: past
  citation_style: apa
  required_sections:
  - abstract
  - introduction
  - methods
  - results
  - discussion
  - limitations
  - conclusion
