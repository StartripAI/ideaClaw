scenario_id: moodys_credit
display_name: Moody's Credit Report
category: finance
objective: Moody's-style credit rating report.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    soundness:
      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.15
      min: 0.7
    citations:
      weight: 0.1
      min: 0.6
    significance:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.95
  voice: third_person
  citation_style: natbib
  required_sections:
  - rating summary
  - credit strengths
  - credit challenges
  - rating outlook
  - financial data
