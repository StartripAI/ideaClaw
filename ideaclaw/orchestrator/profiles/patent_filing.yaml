scenario_id: patent_filing
display_name: Patent Application (USPTO)
category: legal_ip
tags:
- patent
- ip
objective: Produce a high-quality Patent Application (USPTO) that meets professional
  standards for the legal_ip domain. USPTO patent application with claims and novelty
  over prior art.
max_iterations: 4
target_score: 0.8
min_score: 0.55
evaluation:
  criteria:
    novelty:
      weight: 0.3
      min: 0.75
    clarity:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.15
      min: 0.75
    citations:
      weight: 0.15
      min: 0.7
search:
  apis:
  - semantic_scholar
  - openalex
  - google_scholar
  recency_years: 20
  min_sources: 30
  max_sources: 50
style:
  formality: 0.98
  voice: third_person
  tense: present
  citation_style: ieee
  required_sections:
  - abstract
  - field of invention
  - background
  - summary
  - detailed description
  - claims
  - introduction
  - methodology
  terminology_registry: general_professional
time_budget_minutes: 30
experiment:
  enabled: true
