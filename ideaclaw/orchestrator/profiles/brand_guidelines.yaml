scenario_id: brand_guidelines
display_name: Brand Guidelines
category: marketing
objective: Produce a high-quality Brand Guidelines that meets professional standards
  for the marketing domain. Brand voice and style guidelines. Apply E-E-A-T content
  optimization. Adheres to AIDA standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    style:
      weight: 0.25
      min: 0.65
    structure:
      weight: 0.2
      min: 0.65
    depth:
      weight: 0.15
      min: 0.55
    significance:
      weight: 0.15
      min: 0.55
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.7
  voice: third_person
  citation_style: natbib
  required_sections:
  - brand story
  - mission
  - voice
  - tone
  - visual identity
  - dos and donts
  - executive_summary
  - audience
  terminology_registry: marketing_content
tags:
- marketing
- brand-guidelines
time_budget_minutes: 30
experiment:
  enabled: true
