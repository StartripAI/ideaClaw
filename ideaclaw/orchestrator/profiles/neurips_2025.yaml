# NeurIPS 2025 — Neural Information Processing Systems
scenario_id: neurips_2025
display_name: "NeurIPS 2025 Conference Paper"
category: academic_ml
version: "1.0"
tags: [ml, conference, top-tier, neurips]

objective: |
  Produce a NeurIPS 2025 submission. Must include the NeurIPS Paper Checklist
  (ethics, reproducibility, broader impact). Experiments must be reproducible
  with publicly available code and data.

max_iterations: 5
target_score: 0.85
min_score: 0.60

# Ref: https://neurips.cc/Conferences/2025/PaperChecklist
evaluation:
  criteria:
    novelty:
      weight: 0.20
      min: 0.70
    soundness:
      weight: 0.20
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.70
    significance:
      weight: 0.15
      min: 0.60
    reproducibility:
      weight: 0.15
      min: 0.70
      description: "Code availability, hyperparameter reporting, random seeds"
    citations:
      weight: 0.10
      min: 0.80
    ethics:
      weight: 0.05
      min: 0.50
      description: "Broader impact statement, limitations discussion"

search:
  apis: [arxiv, semantic_scholar, openalex]
  domains: [cs.LG, cs.AI, cs.CL, cs.CV, stat.ML]
  recency_years: 3
  min_sources: 30
  max_sources: 100

style:
  formality: 0.95
  voice: third_person
  tense: present
  citation_style: natbib
  max_pages: 9
  required_sections:
    - abstract
    - introduction
    - related work
    - method
    - experiments
    - conclusion
    - broader impact
    - limitations
