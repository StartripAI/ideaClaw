max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    novelty:
      weight: 0.2
      min: 0.7
    soundness:
      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.7
    significance:
      weight: 0.15
      min: 0.6
    citations:
      weight: 0.1
      min: 0.8
    depth:
      weight: 0.15
      min: 0.7
    reproducibility:
      weight: 0.1
      min: 0.7
    ethics:
      weight: 0.05
      min: 0.5
