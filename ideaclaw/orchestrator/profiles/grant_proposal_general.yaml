scenario_id: grant_proposal_general
display_name: General Grant Proposal
category: general
objective: Produce a high-quality General Grant Proposal that meets professional standards
  for the general domain. General-purpose research grant. Follows systematic analysis
  standards. Follows evidence-based methodology standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    significance:
      weight: 0.25
      min: 0.75
    novelty:
      weight: 0.2
      min: 0.7
    soundness:
      weight: 0.2
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.7
    depth:
      weight: 0.1
      min: 0.65
    citations:
      weight: 0.1
      min: 0.75
search:
  apis:
  - semantic_scholar
  - openalex
  - google_scholar
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: first_person
  citation_style: apa
  required_sections:
  - specific aims
  - significance
  - innovation
  - approach
  - timeline
  - introduction
  - background
  - analysis
  terminology_registry: general_professional
tags:
- general
- grant-proposal-general
time_budget_minutes: 30
experiment:
  enabled: true
