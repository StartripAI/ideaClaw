scenario_id: tech_blog
display_name: Technical Blog Post
category: professional
objective: Produce a high-quality Technical Blog Post that meets professional standards
  for the professional domain. Engineering blog post for Medium/dev.to. Apply technical
  specification. Follows postmortem analysis standards. Follows decision record standards.
  Adheres to IEEE standards.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
    style:
      weight: 0.2
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.5
  voice: first_person
  citation_style: natbib
  required_sections:
  - introduction
  - body
  - code examples
  - conclusion
  - summary
  - context
  - analysis
  - recommendations
  terminology_registry: technical_professional
tags:
- professional
- tech-blog
time_budget_minutes: 30
experiment:
  enabled: true
