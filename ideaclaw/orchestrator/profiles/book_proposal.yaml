scenario_id: book_proposal
display_name: Book Proposal
category: creative
objective: Produce a high-quality Book Proposal that meets professional standards
  for the creative domain. Non-fiction book proposal. Apply narrative structure. Follows
  screenplay conventions standards. Adheres to Final Draft standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    style:
      weight: 0.3
      min: 0.7
    clarity:
      weight: 0.25
      min: 0.65
    depth:
      weight: 0.2
      min: 0.6
    structure:
      weight: 0.15
      min: 0.6
    novelty:
      weight: 0.1
      min: 0.5
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.75
  voice: third_person
  citation_style: natbib
  required_sections:
  - overview
  - market analysis
  - competitive titles
  - table of contents
  - sample chapter
  - author bio
  - opening
  - setup
  terminology_registry: creative_writing
tags:
- creative
- book-proposal
time_budget_minutes: 30
experiment:
  enabled: true
