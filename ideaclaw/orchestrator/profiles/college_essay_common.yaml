scenario_id: college_essay_common
display_name: Common App Essay
category: education
objective: Produce a high-quality Common App Essay that meets professional standards
  for the education domain. Common App personal essay (650 words). Apply Bloom's taxonomy.
max_iterations: 5
target_score: 0.8
min_score: 0.6
evaluation:
  criteria:
    style:
      weight: 0.3
      min: 0.7
    clarity:
      weight: 0.25
      min: 0.65
    depth:
      weight: 0.2
      min: 0.6
    structure:
      weight: 0.15
      min: 0.6
    novelty:
      weight: 0.1
      min: 0.5
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.6
  voice: first_person
  citation_style: natbib
  required_sections:
  - opening hook
  - body
  - reflection
  - conclusion
  - introduction
  - literature_review
  - methodology
  - analysis
  terminology_registry: academic_education
tags:
- education
- college-essay-common
- common app
time_budget_minutes: 30
experiment:
  enabled: true
