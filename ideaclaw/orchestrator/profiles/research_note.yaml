scenario_id: research_note
display_name: Research Note
category: general
objective: Produce a high-quality Research Note that meets professional standards
  for the general domain. Quick research note or memo.
max_iterations: 2
target_score: 0.7
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
search:
  apis:
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.75
  voice: third_person
  citation_style: natbib
  required_sections:
  - summary
  - background
  - analysis
  - implications
tags:
- general
- research-note
