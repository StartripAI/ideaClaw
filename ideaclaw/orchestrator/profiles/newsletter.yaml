scenario_id: newsletter
display_name: Newsletter
category: creative
objective: Produce a high-quality Newsletter that meets professional standards for
  the creative domain. Email newsletter issue. Apply narrative structure. Follows
  screenplay conventions standards. Adheres to AIDA standards. Emphasizes brand. Follows
  Flesch-Kincaid readability standards.
max_iterations: 5
target_score: 0.7
min_score: 0.6
evaluation:
  criteria:
    style:
      weight: 0.3
      min: 0.7
    clarity:
      weight: 0.25
      min: 0.65
    depth:
      weight: 0.2
      min: 0.6
    structure:
      weight: 0.15
      min: 0.6
    novelty:
      weight: 0.1
      min: 0.5
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.5
  voice: first_person
  citation_style: natbib
  required_sections:
  - subject line
  - opening
  - main story
  - secondary items
  - cta
  - sign-off
  - setup
  - development
  terminology_registry: creative_writing
tags:
- creative
- newsletter
time_budget_minutes: 30
experiment:
  enabled: true
