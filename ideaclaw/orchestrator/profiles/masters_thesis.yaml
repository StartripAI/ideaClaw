scenario_id: masters_thesis
display_name: Master's Thesis
category: education
objective: Produce a high-quality Master's Thesis that meets professional standards
  for the education domain. Comprehensive master's thesis. Apply Bloom's taxonomy.
  Follows learning objectives standards.
max_iterations: 6
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.25
      min: 0.75
    citations:
      weight: 0.15
      min: 0.7
    soundness:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 50
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: apa
  required_sections:
  - abstract
  - introduction
  - literature review
  - methodology
  - results
  - discussion
  - conclusion
  terminology_registry: academic_education
tags:
- education
- masters-thesis
time_budget_minutes: 30
experiment:
  enabled: true
