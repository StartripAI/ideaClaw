scenario_id: audit_report_gao
display_name: GAO Audit Report
category: government
objective: Produce a high-quality GAO Audit Report that meets professional standards
  for the government domain. Government Accountability Office audit report. Apply
  regulatory impact assessment.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    significance:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.15
      min: 0.7
    depth:
      weight: 0.1
      min: 0.6
    citations:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.95
  voice: third_person
  citation_style: natbib
  required_sections:
  - highlights
  - introduction
  - background
  - findings
  - conclusions
  - recommendations
  - agency comments
  terminology_registry: government_policy
tags:
- government
- audit-report-gao
- gao
time_budget_minutes: 30
experiment:
  enabled: true
