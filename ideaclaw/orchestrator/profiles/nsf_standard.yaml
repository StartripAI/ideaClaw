scenario_id: nsf_standard
display_name: NSF Standard Grant
category: grants
objective: Produce a high-quality NSF Standard Grant that meets professional standards
  for the grants domain. NSF per Intellectual Merit + Broader Impacts. Apply merit
  review criteria.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    significance:
      weight: 0.25
      min: 0.75
    novelty:
      weight: 0.2
      min: 0.7
    soundness:
      weight: 0.2
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.7
    depth:
      weight: 0.1
      min: 0.65
    citations:
      weight: 0.1
      min: 0.75
search:
  apis:
  - arxiv
  - semantic_scholar
  - pubmed
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: apa
  required_sections:
  - project summary
  - project description
  - broader impacts
  - references
  - specific_aims
  - significance
  - innovation
  - approach
  terminology_registry: grant_writing
tags:
- grants
- nsf-standard
- nsf
time_budget_minutes: 30
experiment:
  enabled: true
