scenario_id: bcg_scqa
display_name: BCG SCQA Framework
category: business
objective: Produce a high-quality BCG SCQA Framework that meets professional standards
  for the business domain. BCG Situation-Complication-Question-Answer report. Apply
  strategic analysis.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    depth:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.2
      min: 0.7
    citations:
      weight: 0.15
      min: 0.6
    significance:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.65
search:
  apis:
  - semantic_scholar
  - openalex
  - google_scholar
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: apa
  required_sections:
  - situation
  - complication
  - question
  - answer
  - next steps
  - executive_summary
  - situation_analysis
  - findings
  terminology_registry: business_consulting
tags:
- business
- bcg-scqa
- bcg
time_budget_minutes: 30
experiment:
  enabled: true
