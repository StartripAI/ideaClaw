scenario_id: dcf_valuation
display_name: DCF Valuation Model
category: finance
objective: Produce a high-quality DCF Valuation Model that meets professional standards
  for the finance domain. Discounted cash flow valuation narrative. Apply valuation
  methodology. Follows due diligence standards. Follows investment thesis standards.
  Adheres to CFA standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    soundness:
      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.15
      min: 0.7
    citations:
      weight: 0.1
      min: 0.6
    significance:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.85
  voice: third_person
  citation_style: natbib
  required_sections:
  - assumptions
  - revenue model
  - cost structure
  - fcf projections
  - wacc
  - terminal value
  - sensitivity
  terminology_registry: financial_analysis
tags:
- finance
- dcf-valuation
time_budget_minutes: 30
experiment:
  enabled: true
