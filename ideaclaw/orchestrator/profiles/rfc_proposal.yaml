scenario_id: rfc_proposal
display_name: RFC/Design Doc
category: professional
objective: Produce a high-quality RFC/Design Doc that meets professional standards
  for the professional domain. Technical RFC or design document. Apply technical specification.
  Follows postmortem analysis standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.7
  voice: third_person
  citation_style: natbib
  required_sections:
  - summary
  - motivation
  - detailed design
  - alternatives
  - risks
  - timeline
  - context
  - analysis
  terminology_registry: technical_professional
tags:
- professional
- rfc-proposal
- rfc
time_budget_minutes: 30
experiment:
  enabled: true
