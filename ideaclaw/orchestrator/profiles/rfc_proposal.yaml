scenario_id: rfc_proposal
display_name: RFC/Design Doc
category: professional
objective: Produce a high-quality RFC/Design Doc that meets professional standards
  for the professional domain. Technical RFC or design document.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.8
  voice: third_person
  citation_style: natbib
  required_sections:
  - summary
  - motivation
  - detailed design
  - alternatives
  - risks
  - timeline
tags:
- professional
- rfc-proposal
- rfc
