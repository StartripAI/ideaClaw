scenario_id: science_letter
display_name: Science Letter
category: science
objective: Produce a high-quality Science Letter that meets professional standards
  for the science domain. Science short communication. Apply peer-review methodology.
  Follows reproducibility standards standards. Adheres to Nature standards.
max_iterations: 5
target_score: 0.9
min_score: 0.6
evaluation:
  criteria:
    novelty:
      weight: 0.25
      min: 0.8
    soundness:
      weight: 0.25
      min: 0.8
    significance:
      weight: 0.2
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.8
    citations:
      weight: 0.1
      min: 0.85
    depth:
      weight: 0.05
      min: 0.7
search:
  apis:
  - arxiv
  - semantic_scholar
  - pubmed
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: natbib
  required_sections:
  - abstract
  - main text
  - methods
  - introduction
  - background
  - results
  - discussion
  - conclusion
  terminology_registry: scientific_research
tags:
- science
- science-letter
- science
time_budget_minutes: 30
experiment:
  enabled: true
