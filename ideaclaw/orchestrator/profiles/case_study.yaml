scenario_id: case_study
display_name: Business Case Study (HBS)
category: business
tags:
- case
- hbs
objective: Produce a high-quality Business Case Study (HBS) that meets professional
  standards for the business domain. HBS-style case study with exhibits and discussion
  questions. Apply strategic analysis.
max_iterations: 4
target_score: 0.8
min_score: 0.55
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    depth:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.75
    significance:
      weight: 0.15
      min: 0.6
    citations:
      weight: 0.1
      min: 0.5
    style:
      weight: 0.05
      min: 0.6
search:
  apis:
  - semantic_scholar
  - openalex
  - google_scholar
  recency_years: 5
  min_sources: 30
  max_sources: 50
style:
  formality: 0.75
  voice: third_person
  tense: past
  citation_style: apa
  required_sections:
  - introduction
  - company background
  - situation
  - problem
  - analysis
  - exhibits
  - discussion questions
  terminology_registry: business_consulting
time_budget_minutes: 30
experiment:
  enabled: true
