scenario_id: feature_story
display_name: Feature Story
category: journalism
objective: Magazine-style feature story.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.3
      min: 0.75
    soundness:
      weight: 0.25
      min: 0.7
    significance:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.15
      min: 0.7
    style:
      weight: 0.2
      min: 0.7
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.7
  voice: third_person
  citation_style: natbib
  required_sections:
  - opening scene
  - nut graf
  - body
  - anecdotes
  - kicker
