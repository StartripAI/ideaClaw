scenario_id: executive_briefing
display_name: Executive Briefing
category: general
objective: Produce a high-quality Executive Briefing that meets professional standards
  for the general domain. C-suite executive briefing.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    depth:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.2
      min: 0.7
    citations:
      weight: 0.15
      min: 0.6
    significance:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.65
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.85
  voice: third_person
  citation_style: natbib
  required_sections:
  - situation
  - key findings
  - implications
  - recommended actions
  - executive_summary
  - analysis
  - recommendations
  - next_steps
  - appendix
tags:
- general
- executive-briefing
