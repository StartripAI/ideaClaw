scenario_id: yc_memo
display_name: YC Application Memo
category: finance
objective: Produce a high-quality YC Application Memo that meets professional standards
  for the finance domain. Y Combinator-style startup memo. Apply valuation methodology.
  Follows due diligence standards.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    soundness:
      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.15
      min: 0.7
    citations:
      weight: 0.1
      min: 0.6
    significance:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.7
  voice: third_person
  citation_style: natbib
  required_sections:
  - problem
  - solution
  - market
  - traction
  - team
  - ask
  - executive_summary
  - market_overview
  terminology_registry: financial_analysis
tags:
- finance
- yc-memo
- yc
time_budget_minutes: 30
experiment:
  enabled: true
