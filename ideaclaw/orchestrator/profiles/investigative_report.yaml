scenario_id: investigative_report
display_name: Investigative Report
category: journalism
objective: Produce a high-quality Investigative Report that meets professional standards
  for the journalism domain. Long-form investigative journalism.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.3
      min: 0.75
    soundness:
      weight: 0.25
      min: 0.7
    significance:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.15
      min: 0.7
    style:
      weight: 0.1
      min: 0.65
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.8
  voice: third_person
  citation_style: natbib
  required_sections:
  - lede
  - nut graf
  - body
  - evidence
  - impact
  - conclusion
tags:
- journalism
- investigative-report
