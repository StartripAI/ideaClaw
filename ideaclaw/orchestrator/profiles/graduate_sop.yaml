scenario_id: graduate_sop
display_name: Graduate SOP
category: education
objective: Produce a high-quality Graduate SOP that meets professional standards for
  the education domain. Statement of Purpose for grad school. Apply Bloom's taxonomy.
  Follows learning objectives standards. Adheres to APA standards. Emphasizes curriculum.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    citations:
      weight: 0.15
      min: 0.7
    soundness:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.7
  voice: first_person
  citation_style: natbib
  required_sections:
  - opening
  - academic background
  - research experience
  - goals
  - fit
  - conclusion
  - introduction
  - literature_review
  terminology_registry: academic_education
tags:
- education
- graduate-sop
time_budget_minutes: 30
experiment:
  enabled: true
