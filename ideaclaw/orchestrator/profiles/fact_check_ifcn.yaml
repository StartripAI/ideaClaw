scenario_id: fact_check_ifcn
display_name: IFCN Fact Check
category: journalism
objective: Produce a high-quality IFCN Fact Check that meets professional standards
  for the journalism domain. IFCN-compliant fact-check article. Apply investigative
  reporting.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.3
      min: 0.75
    soundness:
      weight: 0.3
      min: 0.8
    significance:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.15
      min: 0.7
    style:
      weight: 0.1
      min: 0.65
search:
  apis:
  - semantic_scholar
  - openalex
  - google_scholar
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.6
  voice: third_person
  citation_style: natbib
  required_sections:
  - claim
  - verdict
  - evidence
  - sources
  - methodology
  - correction
  - headline
  - lead
  terminology_registry: journalism_media
tags:
- journalism
- fact-check-ifcn
- ifcn
time_budget_minutes: 30
experiment:
  enabled: true
