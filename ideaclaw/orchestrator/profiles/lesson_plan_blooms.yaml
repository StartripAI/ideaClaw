scenario_id: lesson_plan_blooms
display_name: Lesson Plan (Bloom's)
category: education
objective: Produce a high-quality Lesson Plan (Bloom's) that meets professional standards
  for the education domain. Lesson plan using Bloom's Taxonomy.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    citations:
      weight: 0.15
      min: 0.7
    soundness:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.75
  voice: third_person
  citation_style: natbib
  required_sections:
  - learning objectives
  - prior knowledge
  - activities
  - assessment
  - differentiation
  - materials
tags:
- education
- lesson-plan-blooms
- bloom
