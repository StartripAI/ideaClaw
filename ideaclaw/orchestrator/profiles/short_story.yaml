scenario_id: short_story
display_name: Short Story
category: creative
objective: Literary short story (Flesch-Kincaid scored).
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    style:
      weight: 0.3
      min: 0.7
    clarity:
      weight: 0.25
      min: 0.65
    depth:
      weight: 0.2
      min: 0.6
    structure:
      weight: 0.15
      min: 0.6
    novelty:
      weight: 0.1
      min: 0.5
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.4
  voice: mixed
  citation_style: natbib
  required_sections:
  - opening
  - rising action
  - climax
  - falling action
  - resolution
