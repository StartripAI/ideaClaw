scenario_id: curriculum_design
display_name: Curriculum Design
category: education
objective: Produce a high-quality Curriculum Design that meets professional standards
  for the education domain. Course curriculum document. Apply Bloom's taxonomy.
max_iterations: 5
target_score: 0.8
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    citations:
      weight: 0.15
      min: 0.7
    soundness:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.7
  voice: third_person
  citation_style: natbib
  required_sections:
  - course overview
  - learning outcomes
  - schedule
  - assessment strategy
  - resources
  - introduction
  - literature_review
  - methodology
  terminology_registry: academic_education
tags:
- education
- curriculum-design
time_budget_minutes: 30
experiment:
  enabled: true
