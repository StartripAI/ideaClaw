  optimization.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    style:
      weight: 0.25
      min: 0.65
    structure:
      weight: 0.2
      min: 0.65
    depth:
      weight: 0.15
      min: 0.55
    significance:
      weight: 0.15
      min: 0.55
