scenario_id: technical_report_ieee
display_name: Technical Report (IEEE)
category: general
objective: Produce a high-quality Technical Report (IEEE) that meets professional
  standards for the general domain. IEEE format technical report. Follows systematic
  analysis standards. Follows evidence-based methodology standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: ieee
  required_sections:
  - abstract
  - introduction
  - background
  - approach
  - implementation
  - evaluation
  - related work
  - conclusion
  terminology_registry: general_professional
tags:
- general
- technical-report-ieee
time_budget_minutes: 30
experiment:
  enabled: true
