scenario_id: phd_dissertation
display_name: PhD Dissertation
category: education
objective: Produce a high-quality PhD Dissertation that meets professional standards
  for the education domain. PhD dissertation with original contribution. Apply Bloom's
  taxonomy. Follows learning objectives standards.
max_iterations: 8
target_score: 0.9
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.25
      min: 0.8
    citations:
      weight: 0.15
      min: 0.7
    soundness:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.6
    novelty:
      weight: 0.2
      min: 0.7
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  - pubmed
  recency_years: 3
  min_sources: 100
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: apa
  required_sections:
  - abstract
  - introduction
  - literature review
  - theoretical framework
  - methodology
  - results
  - discussion
  - conclusion
  - future work
  terminology_registry: academic_education
tags:
- education
- phd-dissertation
time_budget_minutes: 30
experiment:
  enabled: true
