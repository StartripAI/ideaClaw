scenario_id: smart_okr
display_name: SMART OKR Document
category: hr_ops
objective: Produce a high-quality SMART OKR Document that meets professional standards
  for the hr_ops domain. OKRs per SMART criteria framework. Apply SMART goals.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.25
      min: 0.7
    soundness:
      weight: 0.2
      min: 0.65
    depth:
      weight: 0.15
      min: 0.6
    significance:
      weight: 0.15
      min: 0.55
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.75
  voice: third_person
  citation_style: natbib
  required_sections:
  - objective
  - key results
  - initiatives
  - timeline
  - metrics
  - review cadence
  - current_state
  - gap_analysis
  terminology_registry: hr_operations
tags:
- hr_ops
- smart-okr
- smart
time_budget_minutes: 30
experiment:
  enabled: true
