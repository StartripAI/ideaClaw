scenario_id: g2_product_review
display_name: G2-Style Product Review
category: marketing
objective: G2/Capterra-style product comparison.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    style:
      weight: 0.25
      min: 0.65
    structure:
      weight: 0.2
      min: 0.65
    depth:
      weight: 0.15
      min: 0.55
    significance:
      weight: 0.15
      min: 0.55
search:
  apis:
  - arxiv
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.65
  voice: third_person
  citation_style: natbib
  required_sections:
  - overview
  - features
  - pricing
  - pros
  - cons
  - alternatives
  - verdict
