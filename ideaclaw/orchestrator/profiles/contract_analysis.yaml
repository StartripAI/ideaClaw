scenario_id: contract_analysis
display_name: Contract Analysis
category: legal
objective: Produce a high-quality Contract Analysis that meets professional standards
  for the legal domain. Commercial contract analysis memo. Apply legal analysis following
  IRAC methodology. Follows regulatory compliance standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    soundness:
      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.75
    citations:
      weight: 0.2
      min: 0.75
    depth:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.95
  voice: third_person
  citation_style: natbib
  required_sections:
  - summary
  - key terms
  - risk assessment
  - recommendations
  - issue_statement
  - facts
  - analysis
  - rule_application
  terminology_registry: legal_professional
tags:
- legal
- contract-analysis
time_budget_minutes: 30
experiment:
  enabled: true
