scenario_id: competitive_intel
display_name: Competitive Intelligence
category: business
objective: Produce a high-quality Competitive Intelligence that meets professional
  standards for the business domain. Competitive intelligence brief. Apply strategic
  analysis. Follows hypothesis-driven standards. Follows MECE framework standards.
  Adheres to Gartner standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    depth:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.2
      min: 0.7
    citations:
      weight: 0.15
      min: 0.6
    significance:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.65
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 1
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: natbib
  required_sections:
  - executive summary
  - competitor overview
  - product comparison
  - SWOT
  - strategic implications
  - executive_summary
  - situation_analysis
  - findings
  terminology_registry: business_consulting
tags:
- business
- competitive-intel
time_budget_minutes: 30
experiment:
  enabled: true
