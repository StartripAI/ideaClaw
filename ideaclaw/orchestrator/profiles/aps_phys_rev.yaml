scenario_id: aps_phys_rev
display_name: Physical Review Letters
category: science
objective: Produce a high-quality Physical Review Letters that meets professional
  standards for the science domain. PRL letter. Apply peer-review methodology. Follows
  reproducibility standards standards.
max_iterations: 5
target_score: 0.9
min_score: 0.6
evaluation:
  criteria:
    novelty:
      weight: 0.25
      min: 0.8
    soundness:
      weight: 0.25
      min: 0.8
    significance:
      weight: 0.2
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.8
    citations:
      weight: 0.1
      min: 0.85
    depth:
      weight: 0.05
      min: 0.7
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: natbib
  required_sections:
  - abstract
  - introduction
  - method
  - results
  - conclusion
  - background
  - methods
  - discussion
  terminology_registry: scientific_research
tags:
- science
- aps-phys-rev
time_budget_minutes: 30
experiment:
  enabled: true
