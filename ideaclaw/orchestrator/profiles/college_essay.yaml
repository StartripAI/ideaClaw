scenario_id: college_essay
display_name: College Admissions Essay
category: academic_essay
tags:
- essay
- admissions
objective: Produce a high-quality College Admissions Essay that meets professional
  standards for the academic_essay domain. Compelling Common App essay showing personality
  and growth.
max_iterations: 4
target_score: 0.8
min_score: 0.55
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.7
    style:
      weight: 0.3
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.15
      min: 0.65
    novelty:
      weight: 0.1
      min: 0.5
search:
  apis:
  - openalex
  - semantic_scholar
  - google_scholar
  min_sources: 30
  max_sources: 50
  recency_years: 5
style:
  formality: 0.6
  voice: first_person
  tense: mixed
  max_pages: 2
  required_sections:
  - opening hook
  - body
  - reflection
  - conclusion
  - introduction
  - background
  - analysis
  - findings
  terminology_registry: general_professional
time_budget_minutes: 30
experiment:
  enabled: true
