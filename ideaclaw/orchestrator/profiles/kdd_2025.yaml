      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.15
      min: 0.7
    significance:
      weight: 0.15
      min: 0.6
    citations:
      weight: 0.1
      min: 0.8
    depth:
      weight: 0.15
      min: 0.7
