scenario_id: policy_brief_rand
display_name: RAND Policy Brief
category: legal
objective: Produce a high-quality RAND Policy Brief that meets professional standards
  for the legal domain. RAND-style evidence-based policy brief.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    soundness:
      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.75
    citations:
      weight: 0.2
      min: 0.75
    depth:
      weight: 0.1
      min: 0.6
    significance:
      weight: 0.2
      min: 0.7
search:
  apis:
  - semantic_scholar
  recency_years: 3
  min_sources: 15
style:
  formality: 0.85
  voice: third_person
  citation_style: apa
  required_sections:
  - executive summary
  - issue
  - background
  - evidence
  - recommendations
  - conclusion
tags:
- legal
- policy-brief-rand
- rand
