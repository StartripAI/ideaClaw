scenario_id: board_memo
display_name: Board Memo
category: business
objective: Produce a high-quality Board Memo that meets professional standards for
  the business domain. Corporate board memo. Apply strategic analysis. Follows hypothesis-driven
  standards. Follows MECE framework standards. Adheres to McKinsey standards.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    depth:
      weight: 0.2
      min: 0.65
    structure:
      weight: 0.2
      min: 0.7
    citations:
      weight: 0.15
      min: 0.6
    significance:
      weight: 0.1
      min: 0.6
    style:
      weight: 0.1
      min: 0.65
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.9
  voice: third_person
  citation_style: natbib
  required_sections:
  - purpose
  - background
  - analysis
  - recommendation
  - financial impact
  - timeline
  - executive_summary
  - situation
  terminology_registry: business_consulting
tags:
- business
- board-memo
time_budget_minutes: 30
experiment:
  enabled: true
