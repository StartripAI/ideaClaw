scenario_id: tutorial_howto
display_name: Tutorial / How-To Guide
category: general
objective: Produce a high-quality Tutorial / How-To Guide that meets professional
  standards for the general domain. Step-by-step technical tutorial. Follows systematic
  analysis standards. Follows evidence-based methodology standards. Adheres to IEEE
  standards. Emphasizes documentation.
max_iterations: 5
target_score: 0.75
min_score: 0.6
evaluation:
  criteria:
    clarity:
      weight: 0.25
      min: 0.75
    soundness:
      weight: 0.2
      min: 0.7
    structure:
      weight: 0.2
      min: 0.7
    depth:
      weight: 0.2
      min: 0.65
    significance:
      weight: 0.15
      min: 0.6
    style:
      weight: 0.15
      min: 0.55
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.5
  voice: second_person
  citation_style: natbib
  required_sections:
  - introduction
  - prerequisites
  - steps
  - troubleshooting
  - conclusion
  - background
  - analysis
  - findings
  terminology_registry: general_professional
tags:
- general
- tutorial-howto
time_budget_minutes: 30
experiment:
  enabled: true
