scenario_id: ip_opinion
display_name: IP Opinion Letter
category: legal
objective: Produce a high-quality IP Opinion Letter that meets professional standards
  for the legal domain. Intellectual property opinion letter. Apply legal analysis
  following IRAC methodology. Follows regulatory compliance standards. Adheres to
  USPTO standards. Emphasizes patent.
max_iterations: 5
target_score: 0.85
min_score: 0.6
evaluation:
  criteria:
    soundness:
      weight: 0.25
      min: 0.75
    clarity:
      weight: 0.25
      min: 0.7
    structure:
      weight: 0.2
      min: 0.75
    citations:
      weight: 0.2
      min: 0.75
    depth:
      weight: 0.1
      min: 0.6
search:
  apis:
  - arxiv
  - semantic_scholar
  - openalex
  recency_years: 3
  min_sources: 30
  max_sources: 50
style:
  formality: 0.98
  voice: third_person
  citation_style: natbib
  required_sections:
  - opinion
  - background
  - analysis
  - prior art
  - conclusion
  - issue_statement
  - facts
  - rule_application
  terminology_registry: legal_professional
tags:
- legal
- ip-opinion
time_budget_minutes: 30
experiment:
  enabled: true
