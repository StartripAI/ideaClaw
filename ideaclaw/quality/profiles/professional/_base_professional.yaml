meta:
  id: professional._base
  name: Professional Document (Base)
  domain: professional
  is_base: true
format:
  sections:
  - name: summary
    required: true
  - name: details
    required: true
  - name: action_items
    required: true
  constraints:
    language: en
rubric:
  dimensions:
    evidence_coverage:
      weight: 15
    claim_accuracy:
      weight: 20
    reasoning_quality:
      weight: 15
    actionability:
      weight: 25
      description: Clear next steps
    uncertainty_honesty:
      weight: 10
    structure_clarity:
      weight: 10
    counterargument_depth:
      weight: 5
  pass_threshold: 6.5
